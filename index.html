<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkische Grammatik - Visualisierung</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>&#127481;&#127479; T&uuml;rkische Grammatik Visualisierung</h1>
    <p class="subtitle">Satzstruktur und Morphologie</p>


    <div id="app"></div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color word"></div><span>Wort (Satzglied)</span></div>
        <div class="legend-item"><div class="legend-color stem"></div><span>Wortstamm</span></div>
        <div class="legend-item"><div class="legend-color suffix"></div><span>Suffix (Fall/Zeit)</span></div>
        <div class="legend-item"><div class="legend-color neg"></div><span>Verneinung</span></div>
        <div class="legend-item"><div class="legend-color plural"></div><span>Plural (-lar/-ler)</span></div>
        <div class="legend-item"><div class="legend-color pe-typ1"></div><span>Personalendung Typ I (k-Typ)</span></div>
        <div class="legend-item"><div class="legend-color pe-typ2"></div><span>Personalendung Typ II (z-Typ)</span></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
